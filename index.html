<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeAchievements</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #334155;
            --rarity-common: #94a3b8;
            --rarity-uncommon: #22c55e;
            --rarity-rare: #3b82f6;
            --rarity-epic: #a855f7;
            --rarity-legendary: #f97316;
            --rarity-mythic: #ef4444;
            --anim-speed: 0.3s;
        }

        .light-theme {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #e2e8f0;
        }

        .no-animations * { transition: none !important; animation: none !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); transition: background-color var(--anim-speed), color var(--anim-speed); padding-bottom: 40px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 16px; }

        header { background: var(--bg-card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 20px; border: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header-title h1 { font-size: 24px; font-weight: 800; background: linear-gradient(to right, var(--accent), #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .global-medal { font-size: 13px; font-weight: bold; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.1); display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; text-align: center; }
        .stat-box { background: var(--bg-main); padding: 12px 6px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
        .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .progress-container { background: var(--bg-input); border-radius: 8px; height: 8px; overflow: hidden; position: relative; }
        .progress-bar { background: linear-gradient(to right, var(--accent), #22c55e); height: 100%; width: 0%; transition: width var(--anim-speed) ease; }

        /* Section Titles */
        .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 12px 0; display: flex; justify-content: space-between; align-items: center; }

        /* Daily Quests Styles */
        .daily-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 12px; }
        .daily-item { background: var(--bg-main); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .daily-info { flex: 1; }
        .daily-name { font-size: 15px; font-weight: 700; }
        .daily-schedule-text { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .streak-badge { background: rgba(249, 115, 22, 0.15); color: #f97316; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 12px; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }
        .daily-actions { display: flex; align-items: center; gap: 10px; }

        .controls-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 12px 16px; border-radius: 12px; font-size: 15px; outline: none; }
        @media(max-width: 600px) { .search-input { font-size: 16px; } }

        .btn { background: var(--accent); color: white; border: none; padding: 12px 18px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background var(--anim-speed); white-space: nowrap; }
        .btn:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-input); }
        .btn-danger { background: var(--rarity-mythic); color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        .filters-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
        @media(min-width: 768px) { .filters-container { flex-wrap: wrap; overflow-x: visible; padding-bottom: 0; } }
        .filter-tag { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all var(--anim-speed); }
        .filter-tag.active { background: var(--accent); color: white; border-color: var(--accent); }

        .achievements-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media(min-width: 600px) { .achievements-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 900px) { .achievements-grid { grid-template-columns: repeat(3, 1fr); } }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: transform 0.2s; overflow: hidden; }
        .card.completed { border-top: 4px solid var(--rarity-uncommon); opacity: 0.9; }
        .card-image-wrap { width: 100%; height: 160px; overflow: hidden; background: var(--bg-main); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
        .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-image-placeholder { font-size: 48px; opacity: 0.5; }
        .card-content-padding { padding: 16px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
        .card-title { font-size: 17px; font-weight: 700; word-break: break-word; line-height: 1.3; }
        .card-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; flex-grow: 1; word-break: break-word; line-height: 1.4; }
        
        .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .badge { font-size: 10px; font-weight: 600; padding: 3px 6px; border-radius: 6px; text-transform: uppercase; }
        .badge-rarity { color: #fff; }
        .badge-cat { background: var(--bg-input); color: var(--text-muted); }
        .badge-type { background: rgba(99, 102, 241, 0.15); color: var(--accent); }

        .card-interactive { background: var(--bg-main); padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .card-progress-text { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .card-interactive-controls { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
        .interactive-btn { padding: 4px 12px; font-size: 14px; font-weight: bold; }
        @media(max-width: 600px) { .interactive-btn { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; } }

        .checkbox-btn { background: var(--bg-input); border: 2px solid var(--border); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-weight: bold; font-size: 15px; transition: all var(--anim-speed); }
        .checkbox-btn.checked { background: var(--rarity-uncommon); border-color: var(--rarity-uncommon); color: white; }
        @media(max-width: 600px) { .checkbox-btn { width: 44px; height: 44px; font-size: 18px; } }

        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px 16px env(safe-area-inset-bottom, 24px) 16px; box-shadow: 0 -10px 25px -5px rgba(0,0,0,0.3); position: relative; }
        @media(min-width: 600px) { .modal-overlay { align-items: center; padding: 16px; } .modal { border-radius: 20px; max-width: 500px; max-height: 90vh; padding: 24px; } }
        .modal-close-corner { position: absolute; top: 16px; right: 16px; background: var(--bg-input); border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-right: 32px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        .form-control { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 10px 12px; border-radius: 10px; font-size: 15px; outline: none; }
        @media(max-width: 600px) { .form-control { font-size: 16px; padding: 12px; } }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .days-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 4px; }
        .day-label { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 6px; text-align: center; font-size: 12px; cursor: pointer; display: block; }
        .day-label input { display: none; }
        .day-label:has(input:checked) { background: var(--accent); color: white; border-color: var(--accent); }

        .image-preview-box { width: 100%; height: 100px; background: var(--bg-main); border: 1px dashed var(--border); border-radius: 10px; margin-top: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-preview-box img { width: 100%; height: 100%; object-fit: cover; }

        #celebration-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(15, 23, 42, 0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 16px; }
        .medal-anim { font-size: 70px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; margin-bottom: 16px; }
        @keyframes popIn { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .confetti-particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: fall 3s linear infinite; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
        .d-none { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Dashboard Header -->
        <header>
            <div class="header-top">
                <div class="header-title">
                    <h1>LifeAchievements</h1>
                    <div class="global-medal" id="global-medal">🥈 ...</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-secondary btn-sm" id="btn-stats" onclick="toggleModal('modal-stats', true)" data-i18n="btn_stats">📊 Stats</button>
                    <button class="btn btn-secondary btn-sm" onclick="toggleModal('modal-settings', true)">⚙️</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-val" id="stat-total-ap">0</div>
                    <div class="stat-lbl" data-i18n="lbl_total_ap">Total AP</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="stat-count-done">0/0</div>
                    <div class="stat-lbl" data-i18n="lbl_completed">Completed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="stat-percent">0%</div>
                    <div class="stat-lbl" data-i18n="lbl_progress">Progress</div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="global-progress-bar"></div>
            </div>
        </header>

        <!-- DAILY QUESTS SECTION (Пункт 2) -->
        <div class="section-title">
            <span data-i18n="title_dailies">📅 Daily Quests</span>
            <button class="btn btn-secondary btn-sm" onclick="openDailyModal()" data-i18n="btn_add_daily">➕ Add Quest</button>
        </div>
        <div class="daily-container" id="daily-list-container"></div>

        <!-- MAIN ACHIEVEMENTS CONTROLS -->
        <div class="section-title" data-i18n="title_achievements">🏆 Achievements</div>
        <div class="controls-row">
            <input type="text" class="search-input" id="search-bar" placeholder="Search..." oninput="render()">
            <button class="btn" onclick="openCreateModal()" id="btn-create-main">➕ Create</button>
        </div>

        <div class="filters-container" id="filters-list"></div>
        <main class="achievements-grid" id="achievements-container"></main>
    </div>

    <!-- MAIN ACHIEVEMENT MODAL -->
    <div class="modal-overlay" id="modal-achievement" onclick="handleOverlayClick(event, 'modal-achievement')">
        <div class="modal">
            <button type="button" class="modal-close-corner" onclick="toggleModal('modal-achievement', false)">✕</button>
            <div class="modal-title" id="modal-ach-title">Create Achievement</div>
            <form id="ach-form" onsubmit="saveAchievement(event)">
                <input type="hidden" id="form-id">
                
                <div class="form-group">
                    <label data-i18n="form_title">Title</label>
                    <input type="text" id="form-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label data-i18n="form_desc">Description</label>
                    <textarea id="form-desc" class="form-control" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label data-i18n="form_img">Image (Optional)</label>
                    <input type="file" id="form-image-input" class="form-control" accept="image/*" onchange="previewImage(event)">
                    <div class="image-preview-box" id="form-image-preview">
                        <span style="font-size:13px; color:var(--text-muted);" id="lbl-no-img">No Image</span>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="form_cat">Category</label>
                        <select id="form-cat" class="form-control" onchange="checkCustomCategory(this.value)"></select>
                    </div>
                    <div class="form-group d-none" id="custom-cat-wrapper">
                        <label data-i18n="form_custom_cat">New Category Name</label>
                        <input type="text" id="form-custom-cat" class="form-control">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="form_rarity">Rarity</label>
                        <select id="form-rarity" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="form_type">Type</label>
                        <select id="form-type" class="form-control"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="form_use_prog">Use progressive tracking?</label>
                    <select id="form-has-progress" class="form-control" onchange="toggleFormProgressFields(this.value === 'yes')"></select>
                </div>

                <div class="form-row d-none" id="form-progress-fields">
                    <div class="form-group">
                        <label data-i18n="form_curr_val">Current Value</label>
                        <input type="number" id="form-current" class="form-control" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label data-i18n="form_max_val">Target Value</label>
                        <input type="number" id="form-max" class="form-control" value="10" min="1">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="toggleModal('modal-achievement', false)" data-i18n="btn_cancel">Cancel</button>
                    <button type="submit" class="btn" data-i18n="btn_save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- DAILY QUEST MODAL -->
    <div class="modal-overlay" id="modal-daily" onclick="handleOverlayClick(event, 'modal-daily')">
        <div class="modal">
            <button type="button" class="modal-close-corner" onclick="toggleModal('modal-daily', false)">✕</button>
            <div class="modal-title" id="modal-daily-title" data-i18n="daily_modal_title">Create Quest</div>
            <form id="daily-form" onsubmit="saveDailyQuest(event)">
                <input type="hidden" id="daily-id">
                
                <div class="form-group">
                    <label data-i18n="form_title">Title</label>
                    <input type="text" id="daily-title" class="form-control" required>
                </div>

                <div class="form-group">
                    <label data-i18n="daily_schedule_type">Schedule Type</label>
                    <select id="daily-type" class="form-control" onchange="switchDailyTypeFields(this.value)">
                        <option value="days" data-i18n="daily_opt_days">By Days of Week</option>
                        <option value="date" data-i18n="daily_opt_date">Specific Date / Yearly</option>
                    </select>
                </div>

                <!-- Fields for days of week -->
                <div class="form-group" id="daily-days-group">
                    <label data-i18n="daily_choose_days">Select active days:</label>
                    <div class="days-selector">
                        <label class="day-label"><input type="checkbox" value="1"><span data-i18n="day_1">Mon</span></label>
                        <label class="day-label"><input type="checkbox" value="2"><span data-i18n="day_2">Tue</span></label>
                        <label class="day-label"><input type="checkbox" value="3"><span data-i18n="day_3">Wed</span></label>
                        <label class="day-label"><input type="checkbox" value="4"><span data-i18n="day_4">Thu</span></label>
                        <label class="day-label"><input type="checkbox" value="5"><span data-i18n="day_5">Fri</span></label>
                        <label class="day-label"><input type="checkbox" value="6"><span data-i18n="day_6">Sat</span></label>
                        <label class="day-label"><input type="checkbox" value="0"><span data-i18n="day_0">Sun</span></label>
                    </div>
                </div>

                <!-- Fields for calendar date -->
                <div class="form-row d-none" id="daily-date-group">
                    <div class="form-group">
                        <label data-i18n="daily_date">Select Date</label>
                        <input type="date" id="daily-calendar-date" class="form-control">
                    </div>
                    <div class="form-group" style="display:flex; align-items:center; margin-top:20px; padding-left:10px;">
                        <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; color:var(--text-main);">
                            <input type="checkbox" id="daily-yearly"> <span data-i18n="daily_yearly">Every year</span>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="toggleModal('modal-daily', false)" data-i18n="btn_cancel">Cancel</button>
                    <button type="submit" class="btn" data-i18n="btn_save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="modal-settings" onclick="handleOverlayClick(event, 'modal-settings')">
        <div class="modal">
            <button type="button" class="modal-close-corner" onclick="toggleModal('modal-settings', false)">✕</button>
            <div class="modal-title" data-i18n="sett_title">App Settings</div>
            
            <div class="form-group">
                <label data-i18n="sett_lang">Language / Язык</label>
                <select id="setting-lang" class="form-control" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                </select>
            </div>
            <div class="form-group">
                <label data-i18n="sett_theme">Theme</label>
                <select id="setting-theme" class="form-control" onchange="applyTheme(this.value)">
                    <option value="dark" data-i18n="theme_dark">Dark</option>
                    <option value="light" data-i18n="theme_light">Light</option>
                </select>
            </div>
            <div class="form-group">
                <label data-i18n="sett_ui">Interface</label>
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                    <label style="display:flex; align-items:center; gap:8px; color:var(--text-main)">
                        <input type="checkbox" id="setting-anim" checked> <span data-i18n="sett_anim">Enable Animations</span>
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; color:var(--text-main)">
                        <input type="checkbox" id="setting-sound" checked> <span data-i18n="sett_sound">Enable Sound</span>
                    </label>
                </div>
            </div>
            <hr style="border-color: var(--border); margin: 20px 0;">
            <div class="form-group">
                <label data-i18n="sett_backup">Backup data (JSON)</label>
                <div style="display:flex; gap:10px; margin-top: 8px;">
                    <button class="btn btn-secondary btn-sm" onclick="exportData()" style="flex:1" data-i18n="btn_export">📥 Export</button>
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-file').click()" style="flex:1" data-i18n="btn_import">📤 Import</button>
                    <input type="file" id="import-file" class="d-none" accept=".json" onchange="importData(event)">
                </div>
            </div>
            <div class="modal-footer modal-footer-vertical" style="justify-content: space-between; gap:10px;">
                <button class="btn btn-danger btn-sm" onclick="clearAllData()" data-i18n="btn_reset">⚠️ Reset All Data</button>
                <button class="btn btn-secondary" onclick="saveSettings()" data-i18n="btn_close">Close</button>
            </div>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div class="modal-overlay" id="modal-stats" onclick="handleOverlayClick(event, 'modal-stats')">
        <div class="modal">
            <button type="button" class="modal-close-corner" onclick="toggleModal('modal-stats', false)">✕</button>
            <div class="modal-title" data-i18n="stats_detailed">Detailed Statistics</div>
            <div id="detailed-stats-content" style="display:flex; flex-direction:column; gap:12px;"></div>
            <div class="modal-footer">
                <button class="btn" style="width: 100%" onclick="toggleModal('modal-stats', false)" data-i18n="btn_great">Great</button>
            </div>
        </div>
    </div>

    <!-- CELEBRATION OVERLAY -->
    <div id="celebration-overlay">
        <div class="medal-anim" id="cel-medal">🏆</div>

        const RARITIES = {
            common: { ap: 10, color: 'var(--rarity-common)', icon: '⚪' },
            uncommon: { ap: 15, color: 'var(--rarity-uncommon)', icon: '🟢' },

            epic: { ap: 50, color: 'var(--rarity-epic)', icon: '🟣' },

        };

        let state = {
            achievements: [],
            dailies: [], // Новое хранилище под квесты
            categories: [],
            settings: { theme: 'dark', animations: true, sound: true, lang: 'en' },
            activeFilter: 'all'
        };

        let currentUploadedImageBase64 = '';

        window.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            applyTheme(state.settings.theme);
            applyAnimationSetting();
            checkAndResetDailies(); // Рассчитываем страйки на сегодня
            translateStaticHTML();
            syncSettingsForm();
            render();
        });

        function saveToStorage() {
            localStorage.setItem('life_achievements_state', JSON.stringify(state));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('life_achievements_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.settings = parsed.settings || { theme: 'dark', animations: true, sound: true, lang: 'en' };
                    state.achievements = parsed.achievements || [];
                    state.dailies = parsed.dailies || [];
                    // Если категории пустые или не массивом, ставим дефолт
                    if(parsed.categories && parsed.categories.length > 0) {
                        state.categories = parsed.categories;
                    } else {
                        state.categories = [...TRANSLATIONS[state.settings.lang].categories];
                    }
                    state.activeFilter = parsed.activeFilter || 'all';
                } catch(e) { fallbackState(); }
            } else { fallbackState(); }
        }

        function fallbackState() {
            state.settings = { theme: 'dark', animations: true, sound: true, lang: 'en' };
            state.categories = [...TRANSLATIONS.en.categories];
            state.achievements = [];
            state.dailies = [];
        }

        function changeLanguage(langCode) {
            state.settings.lang = langCode;
            // Принудительно заменяем базовые категории, чтобы они мгновенно перевелись
            state.categories = [...TRANSLATIONS[langCode].categories];
            saveToStorage();
            translateStaticHTML();
            render();
        }

        function translateStaticHTML() {
            const lang = state.settings.lang;
            const t = TRANSLATIONS[lang];

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            document.getElementById('search-bar').placeholder = t.search_holder;
            document.getElementById('btn-create-main').innerText = t.btn_create;
            document.getElementById('lbl-no-img').innerText = t.lbl_no_img;

            // Полное исправление селекторов создания достижения
            document.getElementById('form-rarity').innerHTML = `
                <option value="common">${t.rarities.common} (10 AP)</option>
                <option value="uncommon">${t.rarities.uncommon} (15 AP)</option>
                <option value="rare">${t.rarities.rare} (25 AP)</option>
                <option value="epic">${t.rarities.epic} (50 AP)</option>
                <option value="legendary">${t.rarities.legendary} (100 AP)</option>
                <option value="mythic">${t.rarities.mythic} (150 AP)</option>
            `;
            document.getElementById('form-type').innerHTML = `
                <option value="one-time">${t.opt_one}</option>
                <option value="repeatable">${t.opt_rep}</option>
            `;
            document.getElementById('form-has-progress').innerHTML = `
                <option value="no">${t.opt_no}</option>
                <option value="yes">${t.opt_yes}</option>
            `;
        }

        /* --- ЛОГИКА ЕЖЕДНЕВНЫХ ЗАДАНИЙ И СТРАЙКОВ --- */
        function openDailyModal() {
            const t = TRANSLATIONS[state.settings.lang];
            document.getElementById('modal-daily-title').innerText = t.daily_modal_title;
            document.getElementById('daily-form').reset();
            document.getElementById('daily-id').value = '';
            switchDailyTypeFields('days');
            toggleModal('modal-daily', true);
        }

        function switchDailyTypeFields(type) {
            if(type === 'days') {
                document.getElementById('daily-days-group').classList.remove('d-none');
                document.getElementById('daily-date-group').classList.add('d-none');
            } else {
                document.getElementById('daily-days-group').classList.add('d-none');
                document.getElementById('daily-date-group').classList.remove('d-none');
            }
        }

        function saveDailyQuest(e) {
            e.preventDefault();
            const id = document.getElementById('daily-id').value;
            const title = document.getElementById('daily-title').value.trim();
            const type = document.getElementById('daily-type').value;

            let days = [];
            let calendarDate = '';
            let yearly = false;

            if (type === 'days') {
                const checkboxes = document.querySelectorAll('#daily-days-group input:checked');
                checkboxes.forEach(cb => days.push(parseInt(cb.value)));
            } else {
                calendarDate = document.getElementById('daily-calendar-date').value;
                yearly = document.getElementById('daily-yearly').checked;
            }

            if(id) {
                const daily = state.dailies.find(d => d.id === id);
                if(daily) {
                    daily.title = title; daily.type = type; daily.days = days;
                    daily.calendarDate = calendarDate; daily.yearly = yearly;
                }
            } else {
                state.dailies.push({
                    id: Date.now().toString(), title, type, days, calendarDate, yearly,
                    streak: 0, lastCompletedDate: '', lastActiveDateChecked: getTodayDateString()
                });
            }

            saveToStorage();
            toggleModal('modal-daily', false);
            render();
        }

        function deleteDaily(id) {
            const t = TRANSLATIONS[state.settings.lang];
            if(confirm(t.confirm_del)) {
                state.dailies = state.dailies.filter(d => d.id !== id);
                saveToStorage();
                render();
            }
        }

        function editDaily(id) {
            const d = state.dailies.find(daily => daily.id === id);
            if(!d) return;
            const t = TRANSLATIONS[state.settings.lang];
            document.getElementById('modal-daily-title').innerText = t.daily_modal_edit;
            document.getElementById('daily-id').value = d.id;
            document.getElementById('daily-title').value = d.title;
            document.getElementById('daily-type').value = d.type;
            
            switchDailyTypeFields(d.type);

            if(d.type === 'days') {
                document.querySelectorAll('#daily-days-group input').forEach(cb => {
                    cb.checked = d.days.includes(parseInt(cb.value));
                });
            } else {
                document.getElementById('daily-calendar-date').value = d.calendarDate || '';
                document.getElementById('daily-yearly').checked = !!d.yearly;
            }
            toggleModal('modal-daily', true);
        }

        function toggleDailyCheck(id) {
            const d = state.dailies.find(daily => daily.id === id);
            if(!d) return;

            const today = getTodayDateString();
            if(d.lastCompletedDate === today) {
                // Отмена выполнения
                d.lastCompletedDate = '';
                d.streak = Math.max(0, d.streak - 1);
            } else {
                // Выполнение квеста
                d.lastCompletedDate = today;
                d.streak += 1;
                playChime();
            }
            saveToStorage();
            render();
        }

        function getTodayDateString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function isDailyActiveOnDate(daily, dateObj) {
            if (daily.type === 'days') {
                return daily.days.includes(dateObj.getDay());
            } else {
                if(!daily.calendarDate) return false;
                if (daily.yearly) {
                    const parts = daily.calendarDate.split('-'); // YYYY-MM-DD
                    return (dateObj.getMonth() + 1) === parseInt(parts[1]) && dateObj.getDate() === parseInt(parts[2]);
                } else {
                    const targetStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
                    return daily.calendarDate === targetStr;
                }
            }
        }

        // Проверка пропусков и сброс страйков
        function checkAndResetDailies() {
            const todayStr = getTodayDateString();
            const today = new Date();
            
            state.dailies.forEach(d => {
                if(!d.lastActiveDateChecked) d.lastActiveDateChecked = todayStr;
                if(d.lastActiveDateChecked === todayStr) return; // Уже проверяли сегодня

                // Идем назад со вчерашнего дня и ищем последний день, когда квест БЫЛ активен
                let checkDate = new Date();
                checkDate.setDate(checkDate.getDate() - 1);
                let wasActiveYesterdayOrBefore = false;
                
                // Проверяем последние 7 дней на активность
                for(let i=0; i<7; i++) {
                    if(isDailyActiveOnDate(d, checkDate)) {
                        const checkDateStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
                        // Если в тот активный день юзер не закомплитил квест, и этот день позже последнего выполненного — страйк сгорает!
                        if(d.lastCompletedDate !== checkDateStr && (!d.lastCompletedDate || d.lastCompletedDate < checkDateStr)) {
                            d.streak = 0;
                        }
                        break;
                    }
                    checkDate.setDate(checkDate.getDate() - 1);
                }
                d.lastActiveDateChecked = todayStr;
            });
            saveToStorage();
        }

        /* --- ОСТАЛЬНОЙ НАТИВНЫЙ ФУНКЦИОНАЛ --- */
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 500; canvas.height = img.height * (500 / img.width);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentUploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.75);
                    document.getElementById('form-image-preview').innerHTML = `<img src="${currentUploadedImageBase64}">`;
                }
            };
            reader.readAsDataURL(file);
        }

        function playChime() {
            if (!state.settings.sound) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext(); const now = ctx.currentTime;
                let o = ctx.createOscillator(); let g = ctx.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(587.33, now);
                g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.4);
            } catch(e) {}
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function handleOverlayClick(e, id) { if (e.target.id === id) toggleModal(id, false); }

        function openCreateModal() {
            const t = TRANSLATIONS[state.settings.lang];
            document.getElementById('modal-ach-title').innerText = t.modal_create_title;
            document.getElementById('ach-form').reset();
            document.getElementById('form-id').value = '';

            document.getElementById('custom-cat-wrapper').classList.add('d-none');
            toggleFormProgressFields(false);

            toggleModal('modal-achievement', true);

        function checkCustomCategory(val) {
            const w = document.getElementById('custom-cat-wrapper');
            if (val === '__custom__') { w.classList.remove('d-none'); document.getElementById('form-custom-cat').required = true; }
            else { w.classList.add('d-none'); document.getElementById('form-custom-cat').required = false; }

        function toggleFormProgressFields(show) {
            const f = document.getElementById('form-progress-fields');
            if(show) f.classList.remove('d-none'); else f.classList.add('d-none');
        }

        function saveAchievement(e) {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const title = document.getElementById('form-title').value.trim();
            const desc = document.getElementById('form-desc').value.trim();
            let category = document.getElementById('form-cat').value;
            const rarity = document.getElementById('form-rarity').value;
            const type = document.getElementById('form-type').value;
            const hasProgress = document.getElementById('form-has-progress').value === 'yes';
            
            if (category === '__custom__') {
                const customCat = document.getElementById('form-custom-cat').value.trim();
                if(customCat && !state.categories.includes(customCat)) state.categories.push(customCat);
                category = customCat || 'Other';
            }

            let current = 0; let max = 1; let completed = false;
            if (hasProgress) {
                current = parseInt(document.getElementById('form-current').value) || 0;
                max = parseInt(document.getElementById('form-max').value) || 1;
                if (current >= max) { current = max; completed = true; }
            }

            if (id) {
                const ach = state.achievements.find(a => a.id === id);
                if (ach) {
                    const wasCompleted = ach.completed;
                    ach.title = title; ach.desc = desc; ach.category = category; ach.rarity = rarity; ach.type = type; ach.hasProgress = hasProgress; ach.current = current; ach.max = max; ach.completed = completed;
                    if(currentUploadedImageBase64) ach.image = currentUploadedImageBase64;
                    if (completed && !wasCompleted) triggerCelebration(ach);
                }
            } else {
                const newAch = { id: Date.now().toString(), title, desc, category, rarity, type, hasProgress, current, max, completed, image: currentUploadedImageBase64, level: 0 };
                state.achievements.push(newAch);
                if (completed) triggerCelebration(newAch);
            }
            saveToStorage(); toggleModal('modal-achievement', false); render();
        }

        function deleteAchievement(id) {
            if(confirm(TRANSLATIONS[state.settings.lang].confirm_del)) { state.achievements = state.achievements.filter(a => a.id !== id); saveToStorage(); render(); }
        }

        function editAchievement(id) {
            const ach = state.achievements.find(a => a.id === id);
            if(!ach) return;
            const t = TRANSLATIONS[state.settings.lang];
            document.getElementById('modal-ach-title').innerText = t.modal_edit_title;
            document.getElementById('form-id').value = ach.id;
            document.getElementById('form-title').value = ach.title;
            document.getElementById('form-desc').value = ach.desc;
            currentUploadedImageBase64 = ach.image || '';
            document.getElementById('form-image-preview').innerHTML = ach.image ? `<img src="${ach.image}">` : `<span style="font-size:13px; color:var(--text-muted);">${t.lbl_no_img}</span>`;
            updateCategorySelectOptions();
            document.getElementById('form-cat').value = ach.category;
            document.getElementById('form-rarity').value = ach.rarity;
            document.getElementById('form-type').value = ach.type;
            document.getElementById('form-has-progress').value = ach.hasProgress ? 'yes' : 'no';
            toggleFormProgressFields(ach.hasProgress);
            document.getElementById('form-current').value = ach.current;
            document.getElementById('form-max').value = ach.max;
            toggleModal('modal-achievement', true);
        }

        function updateCategorySelectOptions() {
            const select = document.getElementById('form-cat');
            if(!select) return;
            let html = '';
            state.categories.forEach(c => { html += `<option value="${c}">${c}</option>`; });
            html += `<option value="__custom__">${TRANSLATIONS[state.settings.lang].opt_custom_cat}</option>`;
            select.innerHTML = html;
        }

        function toggleSimpleComplete(id) {
            const ach = state.achievements.find(a => a.id === id);
            if (!ach) return;
            ach.completed = !ach.completed;
            if (ach.completed) {
                if (ach.type === 'repeatable') { ach.level = (ach.level || 0) + 1; ach.completed = false; }
                triggerCelebration(ach);
            }
            saveToStorage(); render();
        }

        function adjustProgress(id, amount) {
            const ach = state.achievements.find(a => a.id === id);
            if (!ach) return;
            ach.current = Math.max(0, ach.current + amount);
            if (ach.current >= ach.max) {
                if (ach.type === 'one-time') { ach.current = ach.max; if (!ach.completed) { ach.completed = true; triggerCelebration(ach); } }
                else { ach.level = (ach.level || 0) + 1; ach.current = 0; triggerCelebration(ach); }
            }
            saveToStorage(); render();
        }

        function manualProgressInput(id, value) {
            const ach = state.achievements.find(a => a.id === id);
            if (!ach) return;
            ach.current = Math.max(0, parseInt(value) || 0);
            if (ach.current >= ach.max) {
                if (ach.type === 'one-time') { ach.current = ach.max; ach.completed = true; triggerCelebration(ach); }
                else { ach.level = (ach.level || 0) + 1; ach.current = 0; triggerCelebration(ach); }
            }
            saveToStorage(); render();
        }

        function calculateStats() {
            const t = TRANSLATIONS[state.settings.lang];
            let totalAP = 0; let doneCount = 0;
            state.achievements.forEach(ach => {
                if (ach.type === 'repeatable') totalAP += (ach.level || 0) * RARITIES[ach.rarity].ap;
                else if (ach.completed) totalAP += RARITIES[ach.rarity].ap;
                if (ach.completed || (ach.type === 'repeatable' && (ach.level || 0) > 0)) doneCount++;
            });
            const totalCount = state.achievements.length;
            const percent = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
            let medal = t.ranks.r1;
            if (totalAP >= 2500) medal = t.ranks.r6; else if (totalAP >= 1000) medal = t.ranks.r5; else if (totalAP >= 500) medal = t.ranks.r4; else if (totalAP >= 250) medal = t.ranks.r3; else if (totalAP >= 100) medal = t.ranks.r2;
            return { totalAP, doneCount, totalCount, percent, medal };
        }

        function triggerCelebration(ach) {
            const t = TRANSLATIONS[state.settings.lang];
            document.getElementById('cel-title_banner').innerText = t.cel_banner;
            document.getElementById('cel-ach-name').innerText = ach.title;
            document.getElementById('cel-rarity').innerText = t.rarities[ach.rarity];
            document.getElementById('cel-rarity').style.color = RARITIES[ach.rarity].color;
            document.getElementById('cel-ap').innerText = RARITIES[ach.rarity].ap;
            document.getElementById('celebration-overlay').style.display = 'flex';
            playChime();
            setTimeout(() => { document.getElementById('celebration-overlay').style.display = 'none'; }, 2500);
        }

        function render() {
            const t = TRANSLATIONS[state.settings.lang];
            const calc = calculateStats();
            document.getElementById('stat-total-ap').innerText = calc.totalAP;
            document.getElementById('stat-count-done').innerText = `${calc.doneCount}/${calc.totalCount}`;
            document.getElementById('stat-percent').innerText = `${calc.percent}%`;
            document.getElementById('global-progress-bar').style.width = `${calc.percent}%`;
            document.getElementById('global-medal').innerText = calc.medal;

            // РЕНДЕР ДЕЙЛИКОВ
            const dailyContainer = document.getElementById('daily-list-container');
            dailyContainer.innerHTML = '';
            
            if(state.dailies.length === 0) {
                dailyContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:10px;">${state.settings.lang === 'ru' ? 'Нет активных ежедневных квестов' : 'No daily quests active'}</div>`;
            } else {
                const today = new Date();
                const todayStr = getTodayDateString();

                state.dailies.forEach(d => {
                    const isActiveToday = isDailyActiveOnDate(d, today);
                    const isCompletedToday = d.lastCompletedDate === todayStr;

                    let scheduleDesc = '';
                    if (d.type === 'days') {
                        const dayNames = d.days.map(dayNum => t['day_' + dayNum]);
                        scheduleDesc = `${t.schedule_days} ${dayNames.join(', ')}`;
                    } else {
                        scheduleDesc = d.yearly ? `${t.schedule_yearly} ${d.calendarDate.substring(5)}` : `${t.schedule_date} ${d.calendarDate}`;
                    }

                    const statusBadge = isActiveToday ? `<span style="color:var(--rarity-uncommon); font-size:11px; font-weight:bold;">● ${t.schedule_today}</span>` : `<span style="color:var(--text-muted); font-size:11px;">○ ${t.schedule_inactive}</span>`;

                    let html = `
                        <div class="daily-item" style="${isCompletedToday ? 'opacity: 0.6;' : ''}">
                            <div class="daily-info">
                                <div class="daily-name">${d.title} ${statusBadge}</div>
                                <div class="daily-schedule-text">${scheduleDesc}</div>
                                <div class="streak-badge">🔥 ${t.streak_text} ${d.streak}</div>
                            </div>
                            <div class="daily-actions">
                                <button class="checkbox-btn ${isCompletedToday ? 'checked' : ''}" ${!isActiveToday ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} onclick="toggleDailyCheck('${d.id}')">✓</button>
                                <button class="btn btn-secondary btn-sm" onclick="editDaily('${d.id}')">✏️</button>
                                <button class="btn btn-secondary btn-sm btn-danger" onclick="deleteDaily('${d.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                    dailyContainer.insertAdjacentHTML('beforeend', html);
                });
            }

            // РЕНДЕР КАРТОЧЕК ДОСТИЖЕНИЙ
            renderFilters();
            const container = document.getElementById('achievements-container');
            container.innerHTML = '';
            const searchQuery = document.getElementById('search-bar').value.toLowerCase();

            let filtered = state.achievements.filter(ach => {
                const matchSearch = ach.title.toLowerCase().includes(searchQuery) || ach.desc.toLowerCase().includes(searchQuery);
                if (!matchSearch) return false;
                const f = state.activeFilter;
                if (f === 'all') return true;
                if (f === 'one-time') return ach.type === 'one-time';
                if (f === 'repeatable') return ach.type === 'repeatable';
                if (f === 'completed') return ach.completed || (ach.type === 'repeatable' && ach.level > 0);
                if (f === 'uncompleted') return !ach.completed && (ach.type !== 'repeatable' || ach.level === 0);
                if (RARITIES[f]) return ach.rarity === f;
                return ach.category === f;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">${t.no_items}</div>`;
                return;
            }

            filtered.forEach(ach => {
                const rarityData = RARITIES[ach.rarity];
                const isDone = ach.completed || (ach.type === 'repeatable' && ach.level > 0);
                const localRarityName = t.rarities[ach.rarity];
                const typeLabel = ach.type === 'one-time' ? t.opt_one : `${t.opt_rep} (Lvl ${ach.level || 0})`;
                
                let imgBlockHtml = ach.image ? `<div class="card-image-wrap"><img src="${ach.image}" alt=""></div>` : `<div class="card-image-wrap"><div class="card-image-placeholder">${rarityData.icon}</div></div>`;

                let cardHtml = `
                    <div class="card ${isDone ? 'completed' : ''}">
                        ${imgBlockHtml}
                        <div class="card-content-padding">
                            <div>
                                <div class="card-header">
                                    <div class="card-title">${ach.title}</div>
                                    <div style="font-weight:bold; color:${rarityData.color}; font-size:14px;">+${rarityData.ap} AP</div>
                                </div>
                                <div class="card-desc">${ach.desc || t.txt_no_desc}</div>
                                <div class="badge-row">
                                    <span class="badge badge-rarity" style="background:${rarityData.color}">${localRarityName}</span>
                                    <span class="badge badge-cat">📂 ${ach.category}</span>
                                    <span class="badge badge-type">${typeLabel}</span>
                                </div>
                            </div>
                            <div>
                `;

                if (ach.hasProgress) {
                    const progPercent = Math.min(100, Math.round((ach.current / ach.max) * 100));
                    cardHtml += `
                        <div class="card-interactive">
                            <div class="card-progress-text"><span>${t.lbl_progress}</span><span>${ach.current} / ${ach.max}</span></div>
                            <div class="progress-container" style="height:6px; margin-bottom:10px;"><div class="progress-bar" style="width:${progPercent}%; background:${rarityData.color}"></div></div>
                            <div class="card-interactive-controls">
                                <button class="btn btn-secondary interactive-btn" onclick="adjustProgress('${ach.id}', -1)">-</button>
                                <input type="number" class="form-control" style="padding:4px; font-size:13px; text-align:center; max-width:70px;" value="${ach.current}" onchange="manualProgressInput('${ach.id}', this.value)">
                                <button class="btn btn-secondary interactive-btn" onclick="adjustProgress('${ach.id}', 1)">+</button>
                            </div>
                        </div>
                    `;
                } else {
                    cardHtml += `
                        <div class="card-interactive" style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:13px; font-weight:600;">${t.txt_done_label}</span>
                            <button class="checkbox-btn ${ach.completed ? 'checked' : ''}" onclick="toggleSimpleComplete('${ach.id}')">✓</button>
                        </div>
                    `;
                }

                cardHtml += `
                                <div class="card-actions">
                                    <div style="display:flex; gap:6px; width:100%;">
                                        <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="editAchievement('${ach.id}')">${t.btn_edit}</button>
                                        <button class="btn btn-secondary btn-sm btn-danger" onclick="deleteAchievement('${ach.id}')">🗑️</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            updateDetailedStats();
        }

        function renderFilters() {
            const t = TRANSLATIONS[state.settings.lang];
            const list = document.getElementById('filters-list');
            let tags = [{ id: 'all', label: t.filter_all }, { id: 'completed', label: t.filter_done }, { id: 'uncompleted', label: t.filter_undone }, { id: 'one-time', label: t.filter_one }, { id: 'repeatable', label: t.filter_rep }];
            Object.keys(RARITIES).forEach(k => tags.push({ id: k, label: `✨ ${t.rarities[k]}` }));
            state.categories.forEach(c => tags.push({ id: c, label: `📂 ${c}` }));

            let html = '';
            tags.forEach(tg => { html += `<div class="filter-tag ${state.activeFilter === tg.id ? 'active' : ''}" onclick="state.activeFilter='${tg.id}'; render();">${tg.label}</div>`; });
            list.innerHTML = html;
        }

        function syncSettingsForm() {
            document.getElementById('setting-lang').value = state.settings.lang;
            document.getElementById('setting-theme').value = state.settings.theme;
            document.getElementById('setting-anim').checked = state.settings.animations;
            document.getElementById('setting-sound').checked = state.settings.sound;
        }

        function saveSettings() {
            state.settings.lang = document.getElementById('setting-lang').value;
            state.settings.theme = document.getElementById('setting-theme').value;
            state.settings.animations = document.getElementById('setting-anim').checked;
            state.settings.sound = document.getElementById('setting-sound').checked;
            saveToStorage(); applyTheme(state.settings.theme); applyAnimationSetting(); changeLanguage(state.settings.lang); toggleModal('modal-settings', false);
        }

        function applyTheme(t) { if(t === 'light') document.body.classList.add('light-theme'); else document.body.classList.remove('light-theme'); }
        function applyAnimationSetting() { if(!state.settings.animations) document.body.classList.add('no-animations'); else document.body.classList.remove('no-animations'); }

        function clearAllData() {
            if (confirm(TRANSLATIONS[state.settings.lang].confirm_reset)) { localStorage.removeItem('life_achievements_state'); fallbackState(); window.location.reload(); }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `achievements_backup.json`); dl.click();
        }

        function importData(ev) {
            const file = ev.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const p = JSON.parse(e.target.result);
                    if (p && Array.isArray(p.achievements)) { state = p; saveToStorage(); window.location.reload(); }
                } catch (err) { alert('Error reading file.'); }
            };
            reader.readAsText(file);
        }

        function updateDetailedStats() {
            const content = document.getElementById('detailed-stats-content'); if(!content) return;
            const t = TRANSLATIONS[state.settings.lang];
            let total = state.achievements.length;
            let compl = state.achievements.filter(a => a.completed || (a.type === 'repeatable' && a.level > 0)).length;
            content.innerHTML = `
                <div>${t.stat_total} <b>${total}</b></div>
                <div>${t.stat_done} <b style="color:var(--rarity-uncommon)">${compl}</b></div>
                <div>${t.stat_left} <b>${total - compl}</b></div>
                <div>${t.stat_ap} <b style="color:var(--accent)">${calculateStats().totalAP} AP</b></div>
            `;
        }
    </script>
</body>
</html>
